};

let chatUserName = '';
let awaitingInput = null;

function chatRespond(userMsg) {
  const flow = chatFlows[userMsg] || chatFlows['default'];
  setTimeout(() => {
    state.chatMessages.push({ type: 'bot', text: flow.msg, options: flow.options, inputType: flow.inputType });
    if (flow.inputType) awaitingInput = flow.inputType;
    render();
  }, 600);
}

// =====================================================
// UTILITY FUNCTIONS
// =====================================================
function showNotification(msg) {
  state.notification = msg;
  render();
  setTimeout(() => { state.notification = null; render(); }, 4000);
}

function saveLead(data) {
  const lead = { ...data, id: Date.now(), date: new Date().toLocaleDateString('en-AU'), status: 'New' };
  state.leads.unshift(lead);
  localStorage.setItem('whc_leads', JSON.stringify(state.leads));
  showNotification('✅ Thank you! We\'ll contact you within 2 hours.');
}

function saveReferral(data) {
  const ref = { ...data, id: Date.now(), date: new Date().toLocaleDateString('en-AU'), status: 'Received' };
  state.referrals.unshift(ref);
  localStorage.setItem('whc_referrals', JSON.stringify(state.referrals));
  showNotification('✅ Referral received! Our team will follow up shortly.');
}

async function handleAdminLogin(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {
    email: fd.get('email'),
    password: fd.get('password'),
  };

  try {
    const res = await fetch(API_BASE + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Login failed');
      return;
    }
    state.adminToken = data.token;
    state.isAdminAuthed = true;
    localStorage.setItem('wh_admin_token', data.token);
    render();
  } catch (err) {
    alert('Network error logging in');
  }
}

function adminLogout() {
  state.isAdminAuthed = false;
  state.adminToken = null;
  localStorage.removeItem('wh_admin_token');
  navigate('home');
}

function navigate(page) {
  state.page = page;
  state.mobileNavOpen = false;
  window.scrollTo(0, 0);
  render();
}
function toggleMobileNav() {
  state.mobileNavOpen = !state.mobileNavOpen;
  render();
}

      <div style="background:linear-gradient(135deg,#e0f5f5,#e8f4fd);border-radius:20px;padding:36px;margin-bottom:50px;display:flex;align-items:center;gap:30px;flex-wrap:wrap;">
        <div style="font-size:48px;">📘</div>
        <div style="flex:1;">
          <h3 style="font-size:22px;color:#0d5c5c;margin-bottom:8px;">Free Download: How to Access NDIS Support</h3>
          <p style="color:#6b8585;font-size:15px;">Our comprehensive 28-page guide walks you through eligibility, applying, planning and getting the most from your NDIS funding.</p>
        </div>
        <button onclick="downloadGuide()" class="btn-primary" style="flex-shrink:0;">${icons.download} Download Free</button>
      </div>
      <!-- Blog posts -->
      <div style="margin-bottom:20px;">
        <span class="section-tag">Articles</span>
        <h2 style="font-size:32px;color:#0d5c5c;margin-bottom:8px;">Latest Resources</h2>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;">
        ${state.blogPosts.map(post=>`
        <div class="blog-card" style="background:white;">
          <div style="height:160px;background:linear-gradient(135deg,#0d7a7a20,#3b82c420);display:flex;align-items:center;justify-content:center;font-size:48px;">
            ${post.category==='NDIS'?'🦾':post.category==='Aged Care'?'🌸':post.category==='Family'?'👨‍👩‍👧':'🤝'}
          </div>
          <div style="padding:24px;">
            <div style="display:flex;gap:10px;margin-bottom:12px;">
              <span style="background:#e0f5f5;color:#0d7a7a;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;">${post.category}</span>
              <span style="font-size:12px;color:#6b8585;">${post.readTime} read</span>
            </div>
            <h3 style="font-size:17px;color:#0d5c5c;margin-bottom:8px;line-height:1.4;">${post.title}</h3>
            <p style="font-size:14px;color:#6b8585;line-height:1.6;margin-bottom:16px;">${post.excerpt.substring(0,120)}...</p>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div style="font-size:12px;color:#6b8585;">${post.date} • ${post.author}</div>
              <button style="background:none;border:none;color:#0d7a7a;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;">Read ${icons.arrow}</button>
            </div>
          </div>
        </div>`).join('')}
      </div>
      <!-- Newsletter -->
      <div style="margin-top:60px;background:linear-gradient(135deg,#0d5c5c,#0d7a7a);border-radius:20px;padding:40px;text-align:center;color:white;">
        <h3 style="font-size:24px;margin-bottom:8px;">Stay Informed</h3>
        <p style="color:rgba(255,255,255,0.8);margin-bottom:24px;">Get monthly NDIS updates, care tips and news delivered to your inbox.</p>
        <form onsubmit="handleNewsletter(event)" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <input type="email" name="email" required placeholder="your@email.com" style="max-width:320px;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:white;" />
          <button type="submit" class="btn-primary" style="background:white;color:#0d7a7a;flex-shrink:0;">Subscribe</button>
        </form>
      </div>
    </div>
  </section>`;
}

function handleNewsletter(e) {
  e.preventDefault();
  showNotification('✅ Subscribed! Welcome to the Warm Horizon newsletter.');
  e.target.reset();
}

function handleContactForm(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  saveLead({...Object.fromEntries(fd), source:'Contact Form'});
  e.target.reset();
}

function renderAdminDashboard() {
  return `
  <div>
    <h1 style="font-family:'Fraunces',serif;font-size:28px;color:#0d5c5c;margin-bottom:6px;">Dashboard</h1>
    <p style="color:#6b8585;margin-bottom:32px;">Welcome back. Here's what's happening today.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px;">
      ${[
        {label:'Total Enquiries', value:state.leads.length, icon:'👥', colour:'#0d7a7a'},
        {label:'Referrals Received', value:state.referrals.length, icon:'🔗', colour:'#3b82c4'},
        {label:'Blog Posts', value:state.blogPosts.length, icon:'📝', colour:'#e8a045'},
        {label:'Response Rate', value:'98%', icon:'⚡', colour:'#10b981'},
      ].map(s=>`
      <div class="stat-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:28px;">${s.icon}</span>
          <div style="width:36px;height:36px;background:${s.colour}20;border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <div style="width:10px;height:10px;background:${s.colour};border-radius:2px;"></div>
          </div>
        </div>
        <div style="font-family:'Fraunces',serif;font-size:32px;color:#0d5c5c;font-weight:700;">${s.value}</div>
        <div style="font-size:13px;color:#6b8585;">${s.label}</div>
      </div>`).join('')}
    </div>
    <div style="background:white;border-radius:16px;padding:24px;border:1px solid #e8f0f0;">
      <h3 style="font-size:16px;color:#0d5c5c;margin-bottom:16px;">Recent Enquiries</h3>
      ${state.leads.length===0 ? `<p style="color:#6b8585;font-size:14px;">No enquiries yet. They'll appear here when visitors submit the contact form.</p>` : `
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="border-bottom:1px solid #e8f0f0;">
          ${['Name','Service','Phone','Date','Status'].map(h=>`<th style="text-align:left;padding:8px;font-size:13px;color:#6b8585;font-weight:500;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${state.leads.slice(0,5).map(l=>`
          <tr style="border-bottom:1px solid #f8fbfb;">
            <td style="padding:10px 8px;font-size:14px;color:#0d5c5c;font-weight:500;">${l.firstName||''} ${l.lastName||''}</td>
            <td style="padding:10px 8px;font-size:13px;color:#6b8585;">${l.serviceType||l.enquiryType||'General'}</td>
            <td style="padding:10px 8px;font-size:13px;color:#6b8585;">${l.phone||''}</td>
            <td style="padding:10px 8px;font-size:13px;color:#6b8585;">${l.date||''}</td>
            <td style="padding:10px 8px;"><span style="background:#d1fae5;color:#065f46;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">New</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;
}

function renderAdminLeads() {
  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <div>
        <h1 style="font-family:'Fraunces',serif;font-size:28px;color:#0d5c5c;">Client Enquiries</h1>
        <p style="color:#6b8585;">${state.leads.length} total enquiries</p>
      </div>
      <button onclick="exportCSV('leads')" class="btn-primary" style="font-size:14px;padding:10px 20px;">${icons.download} Export CSV</button>
    </div>
    ${state.leads.length===0 ? `
    <div style="background:white;border-radius:16px;padding:60px;text-align:center;border:1px solid #e8f0f0;">

function exportCSV(type) {
  const data = type === 'leads' ? state.leads : state.referrals;
  if (data.length === 0) { showNotification('No data to export yet.'); return; }
  const keys = Object.keys(data[0]);
  const csv = [keys.join(','), ...data.map(r=>keys.map(k=>`"${(r[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${type}_export_${Date.now()}.csv`; a.click();
  showNotification('✅ Export downloaded!');
}

function toggleChat() {
  state.chatOpen = !state.chatOpen;
  if (state.chatOpen && state.chatMessages.length === 0) {
    state.chatMessages.push({ type:'bot', text: chatFlows[0].msg, options: chatFlows[0].options });
  }
  render();
  if (state.chatOpen) setTimeout(() => {
    const msgs = document.getElementById('chat-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 100);
}

function sendChatOption(option) {
  state.chatMessages.push({ type:'user', text: option });
  render();
  chatRespond(option);
}

function sendChatMessage(inputId) {
  const input = document.getElementById(inputId);
  if (!input || !input.value.trim()) return;
  const msg = input.value.trim();
  input.value = '';
  state.chatMessages.push({ type:'user', text: msg });
  render();
  if (awaitingInput === 'name') {
    chatUserName = msg;
    awaitingInput = 'email';
    setTimeout(() => {
      state.chatMessages.push({ type:'bot', text: `Great to meet you, ${chatUserName}! What's the best email address for our team to reach you?` });
      render();
    }, 600);
  } else if (awaitingInput === 'email') {
    awaitingInput = null;
    saveLead({ name: chatUserName, email: msg, source: 'Chatbot' });
    setTimeout(() => {
      state.chatMessages.push({ type:'bot', text: `Thank you! Our care team will contact you within 2 hours. Is there anything else I can help with?`, options: ['Tell me about services', 'NDIS questions', 'No thanks'] });
      render();
    }, 600);
  } else if (awaitingInput === 'callback') {
    awaitingInput = null;
    saveLead({ contact: msg, source: 'Chatbot callback' });
    setTimeout(() => {
      state.chatMessages.push({ type:'bot', text: `Thanks! We'll call you back shortly. Is there anything else I can help with?`, options: ['Tell me about services', 'Book consultation'] });
      render();
    }, 600);
  } else {
    chatRespond(msg.toLowerCase().includes('ndis') ? 'NDIS questions' : msg.toLowerCase().includes('aged') ? 'I need aged care' : 'default');
  }
}

          ${['Personal Care','Support Coordination','Community Participation','Aged Care','Respite Care','Transport'].map(s=>`<div style="margin-bottom:8px;"><button onclick="navigate('disability')" style="background:none;border:none;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;font-family:inherit;text-align:left;">${s}</button></div>`).join('')}
        </div>
        <div>
          <div style="color:white;font-weight:600;font-size:14px;margin-bottom:16px;">Company</div>
          ${[['About Us','about'],['Careers','careers'],['Resources','resources'],['Refer a Client','refer'],['Contact','contact'],['Admin','admin']].map(([l,p])=>`<div style="margin-bottom:8px;"><button onclick="navigate('${p}')" style="background:none;border:none;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;font-family:inherit;">${l}</button></div>`).join('')}
        </div>
        <div>
          <div style="color:white;font-weight:600;font-size:14px;margin-bottom:16px;">Contact</div>
          <div style="font-size:13px;margin-bottom:10px;">1800 WAR HOR</div>
          <div style="font-size:13px;margin-bottom:10px;">support@warmhorizon.com</div>
          <div style="font-size:13px;margin-bottom:10px;">Perth, Western Australia</div>
          <div style="font-size:13px;opacity:0.5;">Mon–Fri: 8am–6pm<br/>24/7 Support Line</div>
        </div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;">
        <div style="font-size:12px;opacity:0.5;">© 2025 Warm Horizon Care Pty Ltd. ABN 12 345 678 901. NDIS Registered Provider. Serving Perth and Western Australia only.</div>
        <div style="display:flex;gap:20px;font-size:12px;opacity:0.6;">
          <span style="cursor:pointer;">Privacy Policy</span>
          <span style="cursor:pointer;">Terms of Service</span>
          <span style="cursor:pointer;">Accessibility</span>
          <span style="cursor:pointer;">Complaints</span>
        </div>
      </div>
    </div>
  </footer>`;
}

// =====================================================
// MAIN RENDER
// =====================================================
function render() {
  const app = document.getElementById('app');
  const isAdmin = state.page === 'admin';
  
  const pages = {
    home: renderHome,
    about: renderAbout,
    disability: renderDisability,
    'aged-care': renderAgedCare,
    refer: renderRefer,
    careers: renderCareers,
    resources: renderResources,
    contact: renderContact,
    admin: () => (state.isAdminAuthed ? renderAdmin() : renderAdminLogin()),
  };
  
  const pageContent = (pages[state.page] || renderHome)();
  
  app.innerHTML = (isAdmin ? '' : renderNav()) + pageContent + (isAdmin ? '' : renderFooter()) + renderChatbot() + (state.notification ? `<div class="notification">${state.notification}</div>` : '') + (isAdmin ? '' : `<a href="tel:1800WARHOR" class="floating-call" aria-label="Call Warm Horizon Care"><button class="btn-primary" style="border-radius:999px;padding:12px 18px;font-size:14px;align-items:center;gap:8px;display:inline-flex;">${icons.phone} Call Us</button></a>`) + (isAdmin ? '' : `<button type="button" id="go-to-top" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:55;width:48px;height:48px;border-radius:50%;background:#0d7a7a;color:white;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(13,122,122,0.4);font-size:20px;line-height:1;">↑</button>`);
  
  if (!window._goToTopListenerAdded) {
    window._goToTopListenerAdded = true;
    window.addEventListener('scroll', function() {
      var b = document.getElementById('go-to-top');
      if (b) b.style.display = window.scrollY > 400 ? 'block' : 'none';
    });
  }
  var goBtn = document.getElementById('go-to-top');
  if (goBtn) goBtn.style.display = window.scrollY > 400 ? 'block' : 'none';
  
  // Scroll chat to bottom
  if (state.chatOpen) {
    setTimeout(() => {
      const msgs = document.getElementById('chat-messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 50);
  }
}

// =====================================================
// INIT
// =====================================================
// Access admin: yoursite.com/#admin
if (window.location.hash === '#admin') { state.page = 'admin'; }
function doInit() {
  try {
    render();
  } catch (err) {
    var app = document.getElementById('app');
    if (app) app.innerHTML = '<div style="padding:2rem;font-family:sans-serif;"><h1>Something went wrong</h1><p>Please refresh or try again.</p><pre style="margin-top:1rem;font-size:12px;color:#666;">' + (err && err.message ? err.message : String(err)) + '</pre></div>';
    console.error(err);
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', doInit);
} else {
  doInit();
}
} catch (e) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div style="padding:1rem;font-family:sans-serif;background:#fee;color:#c00;"><strong>Error:</strong> ' + (e && e.message ? e.message : String(e)) + '</div>';
  console.error(e);
}
</script>
</body>
</html>
